<svg width="1400" height="540" viewBox="0 0 1400 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="540" rx="28" fill="#FFFDF8"/>
  <rect x="28" y="28" width="1344" height="484" rx="24" fill="#F8F4EC" stroke="#0F172A" stroke-width="2"/>

  <text x="72" y="110" fill="#0F172A" font-size="44" font-weight="800" font-family="Arial, Helvetica, sans-serif">How Vibe Coach works</text>
  <text x="72" y="150" fill="#475569" font-size="24" font-weight="500" font-family="Arial, Helvetica, sans-serif">One prompt in. A repo-local learning layer out.</text>

  <rect x="72" y="210" width="272" height="214" rx="24" fill="#0F172A"/>
  <text x="102" y="260" fill="#FDBA74" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">STEP 1</text>
  <text x="102" y="304" fill="#F8F4EC" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">Paste the</text>
  <text x="102" y="342" fill="#F8F4EC" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">bootstrap prompt</text>
  <text x="102" y="388" fill="#CBD5E1" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">Use Claude Code, Codex,</text>
  <text x="102" y="416" fill="#CBD5E1" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">Cursor, or another capable agent.</text>

  <rect x="402" y="210" width="272" height="214" rx="24" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="432" y="260" fill="#C2410C" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">STEP 2</text>
  <text x="432" y="304" fill="#0F172A" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">Agent installs</text>
  <text x="432" y="342" fill="#0F172A" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">.vibe-coach</text>
  <text x="432" y="388" fill="#475569" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">The engine lives inside the repo.</text>
  <text x="432" y="416" fill="#475569" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">No detached learning workspace.</text>

  <rect x="732" y="210" width="272" height="214" rx="24" fill="#0F766E"/>
  <text x="762" y="260" fill="#99F6E4" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">STEP 3</text>
  <text x="762" y="304" fill="#ECFEFF" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">Research +</text>
  <text x="762" y="342" fill="#ECFEFF" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">lesson path</text>
  <text x="762" y="388" fill="#CCFBF1" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">The agent inspects the host repo,</text>
  <text x="762" y="416" fill="#CCFBF1" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">writes research, and seeds quizzes.</text>

  <rect x="1062" y="210" width="272" height="214" rx="24" fill="#FFFFFF" stroke="#0F172A" stroke-width="2"/>
  <text x="1092" y="260" fill="#0F172A" font-size="18" font-weight="700" font-family="Arial, Helvetica, sans-serif">STEP 4</text>
  <text x="1092" y="304" fill="#0F172A" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">Learn, note,</text>
  <text x="1092" y="342" fill="#0F172A" font-size="32" font-weight="800" font-family="Arial, Helvetica, sans-serif">and refine</text>
  <text x="1092" y="388" fill="#475569" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">Comments and quiz history guide</text>
  <text x="1092" y="416" fill="#475569" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">the next teaching pass.</text>

  <path d="M344 316H390" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <path d="M674 316H720" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <path d="M1004 316H1050" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <path d="M378 298L402 316L378 334" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M708 298L732 316L708 334" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1038 298L1062 316L1038 334" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
